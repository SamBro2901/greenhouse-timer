<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Growth Stage</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .card {
    text-align: center;
    background: #1e293b;
    padding: 40px 60px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #94a3b8;
    margin: 0 0 12px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #countdown {
    font-size: 48px;
    font-weight: 700;
    color: #4ade80;
    margin: 10px 0;
    font-variant-numeric: tabular-nums;
  }
  #nextTime {
    font-size: 16px;
    color: #cbd5e1;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Next Growth Stage In</h1>
  <div id="countdown">--:--:--</div>
  <div id="nextTime">calculating...</div>
</div>

<script>
  // --- Configuration ---
  // Start time: 9:47 AM on 30th June 2026 (local time)
  const startTime = new Date(2026, 6, 1, 10, 05, 40); // month is 0-indexed: 5 = June

  // Interval between stages: 2 hours, 1 minute, 30 seconds
  const intervalMs = ((2 * 60 * 60) + (1 * 60) + 30) * 1000;

  function getNextStageTime() {
    const now = new Date();
    const elapsed = now - startTime;

    if (elapsed < 0) {
      // Hasn't started yet
      return startTime;
    }

    const stagesPassed = Math.floor(elapsed / intervalMs) + 1;
    return new Date(startTime.getTime() + stagesPassed * intervalMs);
  }

  function formatDuration(ms) {
    if (ms < 0) ms = 0;
    let totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    totalSeconds %= 3600;
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return (
      String(hours).padStart(2, '0') + ':' +
      String(minutes).padStart(2, '0') + ':' +
      String(seconds).padStart(2, '0')
    );
  }

  function formatDateTime(date) {
    return date.toLocaleString(undefined, {
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
  }

  function update() {
    const nextStage = getNextStageTime();
    const now = new Date();
    const remaining = nextStage - now;

    document.getElementById('countdown').textContent = formatDuration(remaining);
    document.getElementById('nextTime').textContent = 'Next stage at: ' + formatDateTime(nextStage);
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
